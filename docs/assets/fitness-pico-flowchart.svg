<svg width="1400" height="3200" viewBox="0 0 1400 3200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#A99C8C" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#3D3A36"/>
    </marker>
    <style>
      .title { font: 700 34px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; fill: #1E2A2F; }
      .subtitle { font: 500 18px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; fill: #5F6B72; }
      .label { font: 700 20px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; fill: #24343A; }
      .small { font: 600 16px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; fill: #4E5A61; }
      .tiny { font: 700 15px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; fill: #8B5E2C; }
      .section { font: 700 22px 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; fill: #6C6256; letter-spacing: 1px; }
      .process { fill: #B9B6FF; stroke: #6E68BD; stroke-width: 2; rx: 20; filter: url(#shadow); }
      .decision { fill: #FFBF6B; stroke: #C97E16; stroke-width: 2; filter: url(#shadow); }
      .terminal-start { fill: #A8F0D0; stroke: #4A9C7B; stroke-width: 2; filter: url(#shadow); }
      .terminal-end { fill: #FF6A67; stroke: #BC3A36; stroke-width: 2; filter: url(#shadow); }
      .group { fill: #FFF9F2; stroke: #E4D7C8; stroke-width: 2; stroke-dasharray: 10 10; rx: 28; }
      .line { stroke: #3D3A36; stroke-width: 3.2; fill: none; marker-end: url(#arrow); }
      .line-no-arrow { stroke: #3D3A36; stroke-width: 3.2; fill: none; }
    </style>
  </defs>

  <rect width="1400" height="3200" fill="#FBF6EE"/>

  <text x="700" y="70" text-anchor="middle" class="title">fitness-pico 메인 동작 플로우차트</text>
  <text x="700" y="104" text-anchor="middle" class="subtitle">사용자 확인 → 운동 시작 → 푸시업 감지 → 세트 판정 → 종료</text>

  <text x="120" y="180" class="section">USER FLOW</text>
  <text x="120" y="770" class="section">WORKOUT FLOW</text>

  <rect x="190" y="130" width="1020" height="560" class="group"/>
  <rect x="190" y="720" width="1020" height="2420" class="group"/>

  <rect x="540" y="150" width="320" height="78" rx="39" class="terminal-start"/>
  <text x="700" y="197" text-anchor="middle" class="label">시작</text>

  <path d="M700 228 L700 280" class="line"/>

  <rect x="490" y="280" width="420" height="100" class="process"/>
  <text x="700" y="323" text-anchor="middle" class="label">Dashboard 보드 부팅</text>
  <text x="700" y="353" text-anchor="middle" class="small">및 웹 대시보드 접속</text>

  <path d="M700 380 L700 432" class="line"/>

  <rect x="490" y="432" width="420" height="100" class="process"/>
  <text x="700" y="475" text-anchor="middle" class="label">RFID 카드 태그 또는</text>
  <text x="700" y="505" text-anchor="middle" class="small">현재 사용자 상태 확인</text>

  <path d="M700 532 L700 590" class="line"/>

  <polygon points="700,590 850,690 700,790 550,690" class="decision"/>
  <text x="700" y="683" text-anchor="middle" class="label">등록된</text>
  <text x="700" y="713" text-anchor="middle" class="label">사용자인가?</text>

  <path d="M850 690 L1090 690 L1090 860 L900 860" class="line"/>
  <text x="1000" y="676" text-anchor="middle" class="tiny">예</text>

  <rect x="830" y="810" width="260" height="100" class="process"/>
  <text x="960" y="853" text-anchor="middle" class="label">현재 사용자</text>
  <text x="960" y="883" text-anchor="middle" class="small">전환</text>

  <path d="M550 690 L310 690 L310 850 L500 850" class="line"/>
  <text x="390" y="676" text-anchor="middle" class="tiny">아니오</text>

  <rect x="290" y="800" width="260" height="104" class="process"/>
  <text x="420" y="842" text-anchor="middle" class="label">등록 대기 모드</text>
  <text x="420" y="872" text-anchor="middle" class="small">진입</text>

  <path d="M420 904 L420 958" class="line"/>

  <rect x="290" y="958" width="260" height="116" class="process"/>
  <text x="420" y="1002" text-anchor="middle" class="label">이름, 체중, 목표 세트</text>
  <text x="420" y="1034" text-anchor="middle" class="small">입력</text>

  <path d="M420 1074 L420 1130 L700 1130 L700 1180" class="line"/>

  <rect x="290" y="1128" width="260" height="104" class="process"/>
  <text x="420" y="1170" text-anchor="middle" class="label">사용자 정보</text>
  <text x="420" y="1200" text-anchor="middle" class="small">저장</text>

  <path d="M960 910 L960 1130 L700 1130 L700 1180" class="line"/>

  <rect x="490" y="1180" width="420" height="100" class="process"/>
  <text x="700" y="1223" text-anchor="middle" class="label">운동 시작 버튼 입력</text>
  <text x="700" y="1253" text-anchor="middle" class="small">start 명령 전송</text>

  <path d="M700 1280 L700 1332" class="line"/>

  <rect x="490" y="1332" width="420" height="100" class="process"/>
  <text x="700" y="1375" text-anchor="middle" class="label">Sensor 보드 Tracking 모드</text>
  <text x="700" y="1405" text-anchor="middle" class="small">활성화</text>

  <path d="M700 1432 L700 1484" class="line"/>

  <rect x="490" y="1484" width="420" height="100" class="process"/>
  <text x="700" y="1527" text-anchor="middle" class="label">초음파 센서로 거리 측정</text>
  <text x="700" y="1557" text-anchor="middle" class="small">푸시업 동작 감지</text>

  <path d="M700 1584 L700 1646" class="line"/>

  <polygon points="700,1646 850,1740 700,1834 550,1740" class="decision"/>
  <text x="700" y="1730" text-anchor="middle" class="label">푸시업 1회가</text>
  <text x="700" y="1762" text-anchor="middle" class="label">감지되었는가?</text>

  <path d="M550 1740 L260 1740 L260 1534 L490 1534" class="line"/>
  <text x="392" y="1726" text-anchor="middle" class="tiny">아니오</text>

  <path d="M850 1740 L1040 1740 L1040 1798" class="line"/>
  <text x="946" y="1726" text-anchor="middle" class="tiny">예</text>

  <rect x="910" y="1798" width="260" height="100" class="process"/>
  <text x="1040" y="1841" text-anchor="middle" class="label">반복 횟수 증가</text>
  <text x="1040" y="1871" text-anchor="middle" class="small">및 속도 계산</text>

  <path d="M1040 1898 L1040 1950" class="line"/>

  <rect x="830" y="1950" width="420" height="110" class="process"/>
  <text x="1040" y="1994" text-anchor="middle" class="label">MQTT로 count, speed, daily</text>
  <text x="1040" y="2026" text-anchor="middle" class="small">데이터 발행</text>

  <path d="M1040 2060 L1040 2118" class="line"/>

  <rect x="830" y="2118" width="420" height="110" class="process"/>
  <text x="1040" y="2162" text-anchor="middle" class="label">Dashboard 화면과 Display 보드</text>
  <text x="1040" y="2194" text-anchor="middle" class="small">정보 갱신</text>

  <path d="M1040 2228 L1040 2290" class="line"/>

  <polygon points="1040,2290 1190,2380 1040,2470 890,2380" class="decision"/>
  <text x="1040" y="2366" text-anchor="middle" class="label">한 세트가</text>
  <text x="1040" y="2398" text-anchor="middle" class="label">완료되었는가?</text>

  <path d="M890 2380 L750 2380 L750 1534 L490 1534" class="line"/>
  <text x="820" y="2366" text-anchor="middle" class="tiny">아니오</text>

  <path d="M1190 2380 L1290 2380 L1290 2450 L1120 2450" class="line"/>
  <text x="1240" y="2366" text-anchor="middle" class="tiny">예</text>

  <rect x="980" y="2450" width="310" height="110" class="process"/>
  <text x="1135" y="2494" text-anchor="middle" class="label">세트 수 증가 및</text>
  <text x="1135" y="2526" text-anchor="middle" class="small">휴식 상태 표시</text>

  <path d="M1135 2560 L1135 2618" class="line"/>

  <polygon points="1135,2618 1285,2708 1135,2798 985,2708" class="decision"/>
  <text x="1135" y="2692" text-anchor="middle" class="label">목표 세트에</text>
  <text x="1135" y="2724" text-anchor="middle" class="label">도달했는가?</text>

  <path d="M985 2708 L820 2708 L820 1534 L490 1534" class="line"/>
  <text x="902" y="2694" text-anchor="middle" class="tiny">아니오</text>

  <path d="M1285 2708 L1330 2708 L1330 2840 L980 2840" class="line"/>
  <text x="1308" y="2694" text-anchor="middle" class="tiny">예</text>

  <rect x="850" y="2840" width="390" height="110" class="process"/>
  <text x="1045" y="2884" text-anchor="middle" class="label">운동 종료 처리 및</text>
  <text x="1045" y="2916" text-anchor="middle" class="small">현재 사용자 통계 확인</text>

  <path d="M1045 2950 L1045 3020" class="line"/>

  <rect x="845" y="3020" width="400" height="84" rx="42" class="terminal-end"/>
  <text x="1045" y="3071" text-anchor="middle" class="label">종료</text>

</svg>
