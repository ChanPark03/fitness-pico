<h2>RFID 태그 방식 선택</h2>
<p class="subtitle">운동할 때 RFID 카드를 어떻게 사용할까요?</p>

<div class="options">
  <div class="option" data-choice="a" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>로그인 전용</h3>
      <p>카드 태그 → 사용자 전환 → HTML 버튼으로 시작/종료</p>
      <p style="margin-top:8px;font-size:13px;color:#888;">기존 대시보드 버튼 방식 유지. 카드는 "나 이 사람이야" 역할만.</p>
    </div>
  </div>
  <div class="option" data-choice="b" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>태그 = 시작/종료</h3>
      <p>카드 태그 → 운동 시작, 다시 태그 → 운동 종료</p>
      <p style="margin-top:8px;font-size:13px;color:#888;">카드 하나로 로그인 + 운동 제어까지 완결. 대시보드 버튼은 보조 수단.</p>
    </div>
  </div>
  <div class="option" data-choice="c" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>카드 태그 = 시작, HTML 버튼 = 종료</h3>
      <p>카드로 세션 시작 → 끝낼 때는 대시보드 "Stop" 버튼</p>
      <p style="margin-top:8px;font-size:13px;color:#888;">물리적 시작 + 소프트웨어 종료 조합.</p>
    </div>
  </div>
</div>
